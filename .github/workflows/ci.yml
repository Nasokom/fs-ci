on:
 push:
    branches:
      - main
  # workflow_run:
  #       workflows: ['Hello World!','Deployment pipeline', 'Playwright Tests']
  #       types: [completed]
  #       branches: 
  #        - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Test
        run: |
          npm install
          npm run test

      - name: Deploy
        if: github.ref == 'refs/heads/main'
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl "$deploy_url"
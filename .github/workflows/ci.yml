
on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    with:
     wait-list: |
    [
      {
        "workflowFile": "hello.yml",
      },
      {
        "workflowFile": "pipeline.yml",
      },
     
        {
        "workflowFile": "playwright.yml",
      }
    ]
    steps:
      - uses: actions/checkout@v5
      - name: Test
        run: |
          npm install
          npm run test

      - name: Deploy
        if: github.ref == 'refs/heads/main'
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl "$deploy_url"